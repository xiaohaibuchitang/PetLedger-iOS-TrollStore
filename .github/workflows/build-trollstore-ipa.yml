name: Build TrollStore IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build unsigned app
        run: bash build_trollstore_ipa_ci.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PetLedger-TrollStore-IPA
          path: PetLedger-TrollStore.ipa
